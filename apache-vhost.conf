# Apache Virtual Host Configuration for Question Maker
# PRODUCTION CONFIGURATION
# Save this as: /etc/httpd/conf.d/question-maker.conf
# 
# IMPORTANT: This file is a template. The actual production config is on the server.
# To update production, SSH to the server and edit:
#   sudo nano /etc/httpd/conf.d/question-maker.conf
#
# After making changes:
#   sudo httpd -t          # Test configuration
#   sudo systemctl restart httpd

# Handle API routes - proxy to backend (MUST come first)
# ProxyTimeout: OCR/extraction can take 2–5+ minutes; default proxy timeout may cause 502.
<LocationMatch "^/api/">
    ProxyPass http://localhost:8000
    ProxyPassReverse http://localhost:8000
    ProxyPreserveHost On
    ProxyTimeout 300
    Require all granted
</LocationMatch>

# Handle all other requests - send to frontend (includes /help, /login, /landing, etc.)
# This regex matches everything EXCEPT /api/ routes
<LocationMatch "^(?!\/api\/).*">
    ProxyPass http://localhost:3005
    ProxyPassReverse http://localhost:3005
    ProxyPreserveHost On
    Require all granted
</LocationMatch>
