# Apache Virtual Host Configuration for Question Maker
# Save this as: /etc/apache2/sites-available/question-maker.conf
# or: /etc/httpd/conf.d/question-maker.conf

<VirtualHost *:80>
    ServerName questionmaker.ok.ubc.ca
    ServerAlias www.questionmaker.ok.ubc.ca
    
    # Simple proxy configuration as per deployment steps
    <Location />
        ProxyPass http://localhost:5173/
        ProxyPassReverse http://localhost:5173/
    </Location>
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/question-maker_error.log
    CustomLog ${APACHE_LOG_DIR}/question-maker_access.log combined
</VirtualHost>
