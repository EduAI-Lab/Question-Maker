services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eduquery-postgres-dev
    environment:
      POSTGRES_DB: eduquery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Development)
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile.dev
    container_name: eduquery-backend-dev
    env_file:
      - .env
    environment:
      LOG_LEVEL: debug
    ports:
      - "8000:8000"
    volumes:
      - ./app/backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev
    restart: unless-stopped

  # Frontend (Development)
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile.dev
    container_name: eduquery-frontend-dev
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    # Bind mount hides image node_modules; the anonymous volume keeps deps across restarts.
    # Run npm install on start so new packages (e.g. docx) appear without manual volume pruning.
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

volumes:
  postgres_dev_data:

networks:
  default:
    name: eduquery-dev-network
