# Production override for docker-compose.yml
version: "3.9"

services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    # No volumes in production - uses built assets
    environment:
      VITE_API_URL: /api
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    # In production, nginx serves the built frontend directly
    # Remove the frontend proxy and serve static files
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
