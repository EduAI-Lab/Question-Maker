name: Comprehensive CI

on:
  schedule:
    - cron: '0 2 * * 1' # Run every Monday at 2 AM
  workflow_dispatch: # Allow manual trigger

jobs:
  comprehensive-checks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        cd app/backend
        npm ci
        cd ../frontend
        npm ci
        
    - name: Run comprehensive linting
      run: |
        cd app/backend
        npm run lint
        npm run format:check
        cd ../frontend
        npm run lint
        npm run format:check
        
    - name: Run tests with coverage
      run: |
        cd app/backend
        npm run test:coverage
        cd ../frontend
        npm run test:coverage
        
    - name: Security audit
      run: |
        cd app/backend
        npm audit --audit-level=moderate
        cd ../frontend
        npm audit --audit-level=moderate
        
    - name: Build Docker images
      run: |
        cd app/backend
        docker build -t question-maker-backend:test .
        cd ../frontend
        docker build -t question-maker-frontend:test .
