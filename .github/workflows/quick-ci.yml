name: Quick CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        cd app/backend
        npm ci
        cd ../frontend
        npm ci
        
    - name: Run linting
      run: |
        cd app/backend
        npm run lint
        cd ../frontend
        npm run lint
        
    - name: Run tests
      run: |
        cd app/backend
        npm test
        cd ../frontend
        npm test
