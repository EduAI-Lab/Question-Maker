name: Deploy to Staging

on:
  push:
    branches: [ deploy ]
  workflow_dispatch: # Allow manual triggers

env:
  NODE_VERSION: '20.x'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Cache backend dependencies
      uses: actions/cache@v3
      with:
        path: app/backend/node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-backend-${{ hashFiles('app/backend/package-lock.json') }}
        
    - name: Cache frontend dependencies
      uses: actions/cache@v3
      with:
        path: app/frontend/node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-frontend-${{ hashFiles('app/frontend/package-lock.json') }}
        
    - name: Install backend dependencies
      run: |
        cd app/backend
        npm ci
        
    - name: Install frontend dependencies
      run: |
        cd app/frontend
        npm ci
        
    - name: Run Backend Tests
      run: |
        cd app/backend
        npm test
        
    - name: Run Frontend Tests
      run: |
        cd app/frontend
        npm test
        
    - name: Run security audit (Backend)
      run: |
        cd app/backend
        npm audit --audit-level=moderate
        
    - name: Run security audit (Frontend)
      run: |
        cd app/frontend
        npm audit --audit-level=moderate

  build-and-test-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Backend Docker image
      run: |
        cd app/backend
        docker build -t question-maker-backend:staging .
        
    - name: Build Frontend Docker image
      run: |
        cd app/frontend
        docker build -t question-maker-frontend:staging .
        
    - name: Test Docker Compose
      run: |
        docker-compose config
        
    - name: Test Docker Compose Build
      run: |
        docker-compose build

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-test-docker]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to UBC Server (Staging)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: questionmaker.ok.ubc.ca
        username: ssaada08
        key: ${{ secrets.UBC_SERVER_SSH_KEY }}
        script: |
          cd /srv/www/questionmaker.ok.ubc.ca
          git pull origin deploy
          docker compose down
          docker compose up -d --build
          docker compose ps
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        EDUAI_API_KEY: ${{ secrets.EDUAI_API_KEY }}
        PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          
    - name: Health Check (Staging)
      run: |
        sleep 60
        curl -f -k https://questionmaker.ok.ubc.ca/ || exit 1
        curl -f -k https://questionmaker.ok.ubc.ca/api/ || exit 1
        
    - name: Notify Staging Deployment
      run: |
        echo "✅ Staging deployment completed successfully!"
        echo "🌐 Staging URL: https://questionmaker.ok.ubc.ca"
        echo "📝 Commit: ${{ github.sha }}"
        echo "👤 Author: ${{ github.actor }}"

