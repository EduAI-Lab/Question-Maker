name: Deploy to Staging

on:
  push:
    branches: [ release ]
  workflow_dispatch: # Allow manual triggers

env:
  NODE_VERSION: '20.x'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Cache backend dependencies
      uses: actions/cache@v3
      with:
        path: app/backend/node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-backend-${{ hashFiles('app/backend/package-lock.json') }}
        
    - name: Cache frontend dependencies
      uses: actions/cache@v3
      with:
        path: app/frontend/node_modules
        key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-frontend-${{ hashFiles('app/frontend/package-lock.json') }}
        
    - name: Install backend dependencies
      run: |
        cd app/backend
        npm ci
        
    - name: Install frontend dependencies
      run: |
        cd app/frontend
        npm ci
        
    - name: Lint Backend (if configured)
      run: |
        cd app/backend
        node -e "const p=require('./package.json');process.exit(p.scripts&&p.scripts.lint?0:1)" && npm run lint || echo "No backend lint script; skipping"
        
    - name: Lint Frontend (if configured)
      run: |
        cd app/frontend
        node -e "const p=require('./package.json');process.exit(p.scripts&&p.scripts.lint?0:1)" && npm run lint || echo "No frontend lint script; skipping"
        
    - name: Run Backend Tests
      run: |
        cd app/backend
        npm test
        
    - name: Run Frontend Tests
      run: |
        cd app/frontend
        npm test
        
    # Security audits removed per project scope

  build-and-test-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Create .env for Compose (CI only)
      run: |
        echo "POSTGRES_PASSWORD_PRODUCTION=${POSTGRES_PASSWORD_PRODUCTION:-dummy_password}" > .env
        echo "Created .env with POSTGRES_PASSWORD_PRODUCTION set for CI"
      env:
        POSTGRES_PASSWORD_PRODUCTION: ${{ secrets.POSTGRES_PASSWORD_PRODUCTION }}

    - name: Build Backend Docker image
      run: |
        cd app/backend
        docker build -t question-maker-backend:staging .
        
    - name: Build Frontend Docker image
      run: |
        cd app/frontend
        docker build -t question-maker-frontend:staging .
        
    - name: Test Docker Compose
      run: |
        docker compose config
        
    - name: Test Docker Compose Build
      run: |
        docker compose build

  merge-to-main:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-test-docker]
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
         
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
         
    - name: Fetch all branches
      run: |
        git fetch origin
         
    - name: Checkout or create main branch
      run: |
        if git ls-remote --heads origin main | grep -q main; then
          echo "Main branch exists, checking out..."
          git checkout -b main origin/main 2>/dev/null || git checkout main
          git pull origin main || true
        else
          echo "Main branch doesn't exist, creating from release..."
          git checkout origin/release || git checkout release
          git checkout -b main
          echo "MAIN_CREATED=true" >> $GITHUB_ENV
        fi
         
    - name: Merge release into main
      run: |
        if [ "$MAIN_CREATED" != "true" ]; then
          git merge origin/release --no-edit -m "Merge release into main [skip ci]" || {
            echo "Merge conflict detected! Please resolve conflicts manually in main branch."
            exit 1
          }
        else
          echo "Main was just created from release, no merge needed"
        fi
         
    - name: Push to main
      run: |
        git push origin main
 